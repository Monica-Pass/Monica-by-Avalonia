name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_DIR: monica by avalonia
  APP_PROJECT: src/Monica.App/Monica.App.csproj

jobs:
  desktop:
    name: Desktop ${{ matrix.rid }} ${{ matrix.mode }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mode: jit
          - os: windows-latest
            rid: win-x64
            mode: aot
          - os: ubuntu-latest
            rid: linux-x64
            mode: jit
          - os: ubuntu-latest
            rid: linux-x64
            mode: aot
          - os: macos-15-intel
            rid: osx-x64
            mode: jit
          - os: macos-15-intel
            rid: osx-x64
            mode: aot
          - os: macos-15
            rid: osx-arm64
            mode: jit
          - os: macos-15
            rid: osx-arm64
            mode: aot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux NativeAOT dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Resolve CI version
        id: version
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./eng/ci/resolve-version.ps1 -Mode ci

      - name: Publish
        id: publish
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-desktop.ps1
          -Project "${{ env.APP_PROJECT }}"
          -RuntimeIdentifier "${{ matrix.rid }}"
          -Mode "${{ matrix.mode }}"
          -Version "${{ steps.version.outputs.version }}"
          -VersionPrefix "${{ steps.version.outputs.version_prefix }}"
          -PackageVersion "${{ steps.version.outputs.package_version }}"
          -AssemblyVersion "${{ steps.version.outputs.assembly_version }}"
          -FileVersion "${{ steps.version.outputs.file_version }}"
          -InformationalVersion "${{ steps.version.outputs.informational_version }}"

      - name: Pack portable artifact
        id: pack
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/package/pack-portable.ps1
          -InputDirectory "${{ steps.publish.outputs.publish_dir }}"
          -OutputDirectory artifacts/packages
          -PackageName "Monica-${{ steps.version.outputs.version }}-${{ matrix.rid }}-${{ matrix.mode }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ steps.version.outputs.version }}-${{ matrix.rid }}-${{ matrix.mode }}
          path: ${{ env.PROJECT_DIR }}/${{ steps.pack.outputs.package_path }}
          if-no-files-found: error
